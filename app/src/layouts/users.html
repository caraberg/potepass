<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../pages/users/users.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gruppe-16</title>
  </head>

  <body>
    <header>
      <div class="wrapper_header">
        <div class="logo">
          <a href="#" class="logo_link"
            ><img src="/app/public/logo.png" alt="logo"
          /></a>
        </div>

        <nav>
          <ul>
            <li><a href="#" id="profile">Min profil</a></li>
            <li><a href="#" id="petsitters">Finn hundepasser</a></li>
            <li><a href="#" id="bookings">Mine Bookinger</a></li>
            <li><a class="logg_ut" href="#" id="logout">Logg ut</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="view" class="main-container">
        <div class="user-container">
          <div class="user-picture">
            <label for="uploadImage" class="user-picture">
              <span class="upload-text">Legg til et bilde</span>
              <img id="userPreviewImage" src="" alt="" />
            </label>
          </div>

          <input type="file" id="uploadImage" accept="image/*" hidden />

          <button type="button" class="addDogBtn">Legg til en hund</button>

          <div class="dog-container">
            <div class="addDog-modal-overlay hidden" id="addDog-modal-overlay">
              <div class="modal">
                <h2>Hundens profil</h2>
                <div class="dog-picture">
                  <label for="uploadImage" class="dog-picture">
                    <span class="upload-text">Legg til et bilde</span>
                    <img id="dogPreviewImage" src="" alt="" />
                  </label>
                </div>
                <div class="editDogForm">
                  <label for="modal-name"></label>
                  <input id="modal-name" type="text" placeholder="Navn" />

                  <label for="modal-age"></label>
                  <input id="modal-age" type="number" placeholder="Alder" />

                  <label for="modal-weight"></label>
                  <input id="modal-weight" type="number" placeholder="Vekt" />

                  <div class="modal-buttons">
                    <button class="modal-saveBtn" id="save-modal-btn">
                      Lagre
                    </button>
                    <button class="modal-cancelBtn" id="close-modal-btn">
                      Slett
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <h2>Din profil</h2>
        <div class="form">
          <div class="editUserForm">
            <label for="edit-email-txt"></label>
            <input
              type="email"
              id="edit-email-txt"
              placeholder="E-post"
              required
            />

            <label for="edit-name-txt"></label>
            <input type="text" id="edit-name-txt" placeholder="Navn" required />

            <label for="edit-surname-txt"></label>
            <input
              type="text"
              id="edit-surname-txt"
              placeholder="Etternavn"
              required
            />

            <label for="edit-password-txt"></label>
            <input
              type="password"
              id="edit-password-txt"
              placeholder="Passord"
              required
            />
            <div class="button-group">
              <button type="submit" class="saveBtn">Lagre</button>
              <button type="button" class="deleteBtn">Slett konto</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="wrapper_footer">
        <div class="logo">
          <a href="" class="footer_logo_link"
            ><img src="/app/public/logo.png" alt="logo"
          /></a>
        </div>

        <nav>
          <ul>
            <li><a href="#" id="min_profil">Min profil</a></li>
            <li><a href="#" id="finn_hundepasser">Finn hundepasser</a></li>
            <li><a href="#" id="mine_bookinger">Mine Bookinger</a></li>
          </ul>
        </nav>

        <div class="icons">
          <img src="/app/public/youtube.svg" alt="you" />
          <img src="/app/public/linkedin.svg" alt="link" />
          <img src="/app/public/twitter.svg" alt="twit" />
          <img src="/app/public/instagram.svg" alt="inst" />
          <img src="/app/public/facebook.svg" alt="face" />
        </div>
      </div>

      <div class="divider_footer"></div>

      <div class="company">Gokstad @ 2026. All rights reserved.</div>
    </footer>
  </body>
</html>
