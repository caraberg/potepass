<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../pages/bookings/bookings.css">
</head>
<body>
    <header>
        <div class="wrapper_header">
            <div class="logo">
                <a href="#" class="logo_link"><img src="/app/public/logo.png" alt="logo" /></a>
            </div>
    
            <nav>
                <ul>
                    <li><a href="#" id="profile">Min profil</a></li>
                    <li><a href="#" id="petsitters">Finn hundepasser</a></li>
                    <li><a href="#" id="bookings">Mine Bookinger</a></li>
                    <li><a class="logg_ut" href="#" id="logout">Logg ut</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="booking_btn">
            <h1>Mine bookinger</h1>
        
            <button class="ny_booking">+ Ny booking</button>
        </div>

        <div class="card_wrapper">
            <img class="card_img" src="/app/public/schafer.jpg" alt="hund">

            <div class="card_info">
                <div class="name">
                    <h2>Leon hos Sofus Hansen</h2>
                    <img src="/app/public/Note_Edit.png" alt="pen" class="edit">
                </div>
                <div class="date">
                    <img src="/app/public/calendar.png" alt="calendar">12-13 mar 2026</div>
                <div class="card_btn">
                    <button class="det_del">Detaljer</button>
                    <button class="det_del">Slett</button>
                </div>
            </div>
        </div>
    </main>


    <footer>
        <div class="wrapper_footer">
            <div class="logo">
                <a href="" class="footer_logo_link"><img src="/app/public/logo.png" alt="logo" /></a>
            </div>
    
            <nav>
                <ul>
                    <li><a href="#" id="min_profil">Min profil</a></li>
                    <li><a href="#" id="finn_hundepasser">Finn hundepasser</a></li>
                    <li><a href="#" id="mine_bookinger">Mine Bookinger</a></li>
                </ul>
            </nav>
    
            <div class="icons">
                <img src="/app/public/youtube.svg" alt="you" />
                <img src="/app/public/linkedin.svg" alt="link" />
                <img src="/app/public/twitter.svg" alt="twit" />
                <img src="/app/public/instagram.svg" alt="inst" />
                <img src="/app/public/facebook.svg" alt="face" />
            </div>
        </div>
    
        <div class="divider_footer"></div>
    
        <div class="company">Gokstad @ 2026. All rights reserved.</div>
    </footer>


    <div class="ny_booking_wrapper">
        <div class="ny_booking_content">
            <h2>Ny booking</h2>
            <form action="">
                <label for="name">Velg hund:</label>
                <input type="text" id="name" name="name" required>

                <label for="name">Velg hundpasser:</label>
                <input type="text" id="name" name="name" required>

                <label for="date">Velg strtdato:</label>
                <input type="date" id="date" name="date" required>

                <label for="date">Antal dager:</label>
                <input type="number" id="date" name="date" required>

                <label for="date">Velg sluttdato:</label>
                <input type="date" id="date" name="date" required>

                <label for="date">Melding (valgfritt):</label>
                <input type="text" id="date" name="date" required>

                <button type="submit">Avbryt</button>

                <button type="submit">Send forespørsel </button>
            </form>
        </div>
    </div>

</body>
</html>
